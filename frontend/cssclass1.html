<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      h1 {
        color: red;
      }
      .goat {
        color: blue;
      }

      #example2 {
        color: green;
      }
    </style>
    <link rel="stylesheet" href="cssclass1style.css" />
  </head>

  <body>
    <h1 style="font-size: 20px; color: aqua">Inline Css</h1>
    <!-- <h1 style="color: chartreuse; font-size: 20px">
      I feel like going to the market today
    </h1> -->

    <div>
      <h1>This is internal css</h1>
      <h2 class="goat">This is styled with class name</h2>
      <h3 id="example2">This is styled with IDs</h3>
    </div>

    <div>
      <p class="external">This is the external css</p>
      <p id="external2">This is an external id</p>
    </div>
  </body>
</html>
