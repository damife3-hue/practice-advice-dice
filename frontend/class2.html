<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Forms</h1>

    <!-- Forms code-->
    <form>
      <input type="text" name="name" placeholder="Kindly put your name" />
      <br />
      <input type="email" name="email" placeholder="Enter your email" /> <br />
      <input
        type="password"
        name="password"
        placeholder="Enter your password"
      />
      <br />
      <textarea name="message" placeholder="Write your message"></textarea>
      <button>click me</button>
    </form>

    <form>
      <div>
        <input type="checkbox" name="Milk" />
        <label for="Milk"> Milk </label>
      </div>
      <div>
        <input type="checkbox" name="Fish" />
        <label for="Fish"> Fish </label>
      </div>
      <div>
        <input type="radio" value="Demilade" name="Demi" />
        <label for="Demi"> Damilade </label>
      </div>
      <input type="color" name="" id="" />
      <input type="date" name="" id="" />
      <input type="number" required />
      <!-- The required makes it so i can't submit -->
      <button type="submit">Submit</button>
    </form>

    <h1>Select (Drop down menu)</h1>
    <select>
      <option value="">Male</option>
      <option value="">Female</option>
      <option value="">Non Binary</option>
      <option value="">Trans</option>
    </select>

    <h1>Tables</h1>
    <table border="1">
      <tr>
        <th>Name</th>
        <th>Age</th>
      </tr>
      <tr>
        <td>John</td>
        <td>24</td>
      </tr>
    </table>

    <table border="1">
      <tr>
        <th>Name</th>
        <th>Score</th>
      </tr>
      <tr>
        <td rowspan="2">Musa</td>
        <td>16</td>
      </tr>
      <tr>
        <td>60</td>
      </tr>
    </table>

    <table border="1">
      <thead>
        <tr>
          <th>Name</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody>
        <!--- The shortcut i used is tbody>tr*2>td*2 -->
        <tr>
          <td>John</td>
          <td>80</td>
        </tr>
        <tr>
          <td>Jane</td>
          <td>90</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td>Total</td>
          <td>170</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
