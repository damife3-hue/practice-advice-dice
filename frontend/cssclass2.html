<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="cssclass2style.css" />
  </head>
  <body>
    <nav>
        <h1>Logo</h1>
    </nav>

    <h1>Hello World</h1>


    <div class="box1">
      <p style="border: 1px solid red">This is my first box with css</p>
    </div>

    <div class="block1"></div>
    <div class="block2"></div>

    <span class="Inline"> Lorem Ipsum dolor </span>

    <div class="sticky"></div>

    <div class="Inline-block"></div>
    <div class="Inline-block"></div>

    <div class="none"></div>

    <!-- Positioning-->
    <div class="static"></div>

    <div class="relative"></div>
    <!-- The shortcut to create a class or id at once is .relative or #relative -->
    
    <div class="parent">
        <div class="child"></div>
    </div>



  </body>
</html>
